<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>million checkboxes</title>
    <style>
      /* ===== RESET ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ===== BODY ===== */
      body {
        background: #0b0b0c;
        color: #e4e4e7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        padding: 40px 20px;
      }

      /* ===== TITLE ===== */
      h1 {
        text-align: center;
        font-size: 2rem;
        font-weight: 500;
        margin-bottom: 40px;
        color: #fafafa;
        letter-spacing: -0.5px;
      }

      /* ===== CONTAINER ===== */
      #container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(42px, 1fr));
        gap: 12px;
        max-width: 720px;
        margin: 0 auto;
        padding: 20px;
      }

      /* ===== CHECKBOX ===== */
      input[type="checkbox"] {
        appearance: none;
        width: 36px;
        height: 36px;
        border-radius: 6px;

        background: #111113;
        border: 1px solid #27272a;

        cursor: pointer;
        transition: all 0.15s ease;
      }

      /* hover (very subtle) */
      input[type="checkbox"]:hover {
        border-color: #3f3f46;
      }

      /* checked state */
      input[type="checkbox"]:checked {
        background: #fafafa;
        border-color: #fafafa;
      }

      /* soft interaction feedback */
      input[type="checkbox"]:active {
        transform: scale(0.96);
      }

      /* ===== OPTIONAL: FOCUS ===== */
      input[type="checkbox"]:focus-visible {
        outline: 2px solid #52525b;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <h1>checkboxes</h1>
    <div id="error-container">
      <button id="error-close">&times;</button>
      <p id="error-message"></p>
    </div>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const container = document.getElementById("container");
      const checkbox_count = 100;
      const errorContainer = document.getElementById("error-container");
      const errorMessage = document.getElementById("error-message");
      const errorClose = document.getElementById("error-close");

      // Show error function
      function showError(message) {
        errorMessage.textContent = message;
        errorContainer.classList.add("show");
        // Auto-hide after 5 seconds
        setTimeout(() => {
          errorContainer.classList.remove("show");
        }, 5000);
      }

      // Close button handler
      errorClose.addEventListener("click", () => {
        errorContainer.classList.remove("show");
      });

      socket.on("server:error", (data) => {
        console.log(`socket server error event`, data);
        const errorMsg = data.error || "An error occurred";
        showError(errorMsg);
      });

      socket.on("server:checkbox:change", (data) => {
        console.log(`socket server event`, data);
        const { index, checked } = data;

        const input = document.getElementById(`checkbox-${index}`);
        if (input) {
          input.checked = checked;
        }
      });

      window.addEventListener("load", async () => {
        const response = await fetch("/checkboxes", { method: "GET" });
        const data = await response.json();
        if (data && data.checkboxes) {
          data.checkboxes.forEach((serverValue, index) => {
            const input = document.createElement("input");
            input.type = "checkbox";
            input.id = `checkbox-${index}`;
            input.checked = serverValue;

            input.addEventListener("change", (event) => {
              const checked = event.target.checked;
              console.log(`checkbox changed`, { index, checked });
              socket.emit("client:checkbox:change", { index, checked });
            });
            container.appendChild(input);
          });
        }
      });
    </script>
  </body>
</html>
